version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps):"
    cooldown:
      default-days: 7
    ignore:
      - dependency-name: "eslint"
        versions: [">= 10.0.0"] # Wait for oxc / plugins to support v10 before major jump
